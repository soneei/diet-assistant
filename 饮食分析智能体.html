<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>饮食分析智能体 - 辨证食疗</title>
<style>
  :root {
    --bg: #ffffff;
    --bg2: #f8f7f4;
    --card: #ffffff;
    --border: #e0ddd5;
    --text: #1a1a18;
    --text2: #6b6a64;
    --text3: #9a9892;
    --primary: #7F77DD;
    --primary-light: #EEEDFE;
    --green: #639922;
    --green-light: #EAF3DE;
    --amber: #BA7517;
    --amber-light: #FAEEDA;
    --coral: #D85A30;
    --coral-light: #FAECE7;
    --teal: #1D9E75;
    --teal-light: #E1F5EE;
    --blue: #378ADD;
    --blue-light: #E6F1FB;
    --red: #E24B4A;
    --red-light: #FCEBEB;
    --shadow: 0 1px 3px rgba(0,0,0,0.06);
    --radius: 12px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg2);
    color: var(--text);
    line-height: 1.6;
    padding: 24px;
  }
  .container { max-width: 820px; margin: 0 auto; }

  /* Header */
  .header {
    background: var(--bg);
    border-radius: var(--radius);
    padding: 28px 32px;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
    margin-bottom: 20px;
  }
  .header h1 {
    font-size: 22px;
    font-weight: 500;
    color: var(--text);
  }
  .header .sub {
    font-size: 14px;
    color: var(--text2);
    margin-top: 4px;
  }
  .header .tag-row {
    display: flex;
    gap: 8px;
    margin-top: 12px;
    flex-wrap: wrap;
  }
  .tag {
    font-size: 12px;
    padding: 3px 10px;
    border-radius: 20px;
    font-weight: 500;
  }
  .tag-tcm { background: var(--amber-light); color: var(--amber); }
  .tag-west { background: var(--blue-light); color: var(--blue); }
  .tag-core { background: var(--primary-light); color: var(--primary); }

  /* Tab nav */
  .tabs {
    display: flex;
    gap: 4px;
    background: var(--bg);
    border-radius: var(--radius);
    padding: 4px;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
    margin-bottom: 20px;
  }
  .tab {
    flex: 1;
    padding: 10px 16px;
    text-align: center;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    color: var(--text2);
    background: transparent;
    border: none;
    transition: all 0.2s;
  }
  .tab:hover { background: var(--bg2); }
  .tab.active {
    background: var(--primary-light);
    color: var(--primary);
  }
  .tab .badge {
    display: inline-block;
    margin-left: 4px;
    font-size: 11px;
    background: var(--text3);
    color: #fff;
    border-radius: 10px;
    padding: 0 6px;
    line-height: 1.6;
  }
  .tab.active .badge { background: var(--primary); }

  /* Cards */
  .card {
    background: var(--bg);
    border-radius: var(--radius);
    padding: 24px 28px;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
    margin-bottom: 16px;
  }
  .card h2 {
    font-size: 16px;
    font-weight: 500;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card h2 .icon {
    width: 28px; height: 28px;
    border-radius: 8px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
  }

  /* Symptom grid */
  .symptom-group { margin-bottom: 20px; }
  .symptom-group h3 {
    font-size: 13px;
    font-weight: 500;
    color: var(--text2);
    margin-bottom: 10px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }
  .symptom-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 6px;
  }
  .symptom-btn {
    padding: 8px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 13px;
    background: var(--bg);
    cursor: pointer;
    text-align: left;
    transition: all 0.15s;
    color: var(--text);
  }
  .symptom-btn:hover { border-color: var(--primary); background: var(--primary-light); }
  .symptom-btn.selected {
    background: var(--primary-light);
    border-color: var(--primary);
    color: var(--primary);
  }

  /* Free text input */
  .free-text {
    width: 100%;
    padding: 12px 16px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 14px;
    font-family: inherit;
    resize: vertical;
    min-height: 80px;
    outline: none;
    transition: border 0.2s;
    background: var(--bg);
    color: var(--text);
  }
  .free-text:focus { border-color: var(--primary); }

  /* Diagnosis input */
  .diag-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 12px;
  }
  .diag-field label {
    display: block;
    font-size: 12px;
    color: var(--text2);
    margin-bottom: 4px;
    font-weight: 500;
  }
  .diag-field input, .diag-field textarea {
    width: 100%;
    padding: 10px 14px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 14px;
    font-family: inherit;
    outline: none;
    background: var(--bg);
    color: var(--text);
    resize: vertical;
  }
  .diag-field input:focus, .diag-field textarea:focus { border-color: var(--primary); }
  .diag-field textarea { min-height: 60px; }

  /* Button */
  .btn-primary {
    display: block;
    width: 100%;
    padding: 14px;
    background: var(--primary);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 16px;
  }
  .btn-primary:hover { background: #6a62c9; }
  .btn-primary:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  /* Analysis result */
  .result-section { display: none; }
  .result-section.visible { display: block; }
  .result-section .card { animation: fadeUp 0.3s ease; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .pattern-badge {
    display: inline-block;
    padding: 6px 16px;
    border-radius: 20px;
    font-weight: 500;
    font-size: 15px;
    margin-bottom: 12px;
  }

  .principle-box {
    background: var(--amber-light);
    border-left: 3px solid var(--amber);
    padding: 12px 16px;
    border-radius: 0 8px 8px 0;
    margin-bottom: 16px;
    font-size: 14px;
    color: var(--amber);
  }

  .food-list {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 12px;
  }
  .food-tag {
    padding: 4px 12px;
    border-radius: 16px;
    font-size: 13px;
    font-weight: 500;
  }
  .food-ok { background: var(--green-light); color: var(--green); }
  .food-no { background: var(--red-light); color: var(--red); }
  .food-warm { background: var(--coral-light); color: var(--coral); }
  .food-cool { background: var(--blue-light); color: var(--blue); }

  /* Meal plan */
  .meal-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 16px;
  }
  .meal-card {
    background: var(--bg2);
    border-radius: 10px;
    padding: 16px;
    border: 1px solid var(--border);
  }
  .meal-card h4 {
    font-size: 14px;
    font-weight: 500;
    margin-bottom: 6px;
  }
  .meal-card .meal-icon { margin-right: 6px; }
  .meal-card p {
    font-size: 13px;
    color: var(--text2);
    line-height: 1.5;
  }

  /* Feedback */
  .feedback-row {
    display: flex;
    gap: 8px;
    margin-top: 12px;
  }
  .feedback-btn {
    padding: 8px 20px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
    background: var(--bg);
    transition: all 0.15s;
  }
  .feedback-btn:hover { border-color: var(--text2); }
  .feedback-btn.selected-good { background: var(--green-light); border-color: var(--green); color: var(--green); }
  .feedback-btn.selected-bad { background: var(--red-light); border-color: var(--red); color: var(--red); }
  .feedback-btn.selected-ok { background: var(--amber-light); border-color: var(--amber); color: var(--amber); }

  /* Food detail modal */
  .food-detail-toggle {
    color: var(--primary);
    cursor: pointer;
    font-size: 13px;
    margin-top: 8px;
    display: inline-block;
  }
  .food-detail-toggle:hover { text-decoration: underline; }

  /* Responsive */
  @media (max-width: 600px) {
    body { padding: 12px; }
    .card { padding: 16px; }
    .header { padding: 20px; }
    .diag-row { grid-template-columns: 1fr; }
    .meal-grid { grid-template-columns: 1fr; }
    .symptom-grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); }
  }

  /* Hidden state */
  .hidden { display: none; }

  /* Confidence meter */
  .confidence-bar {
    width: 100%;
    height: 6px;
    background: var(--bg2);
    border-radius: 3px;
    margin: 8px 0 12px 0;
    overflow: hidden;
  }
  .confidence-fill {
    height: 100%;
    background: var(--primary);
    border-radius: 3px;
    transition: width 0.5s ease;
  }

  /* Loading animation */
  .loading-dots::after {
    content: '';
    animation: dots 1.5s steps(4, end) infinite;
  }
  @keyframes dots {
    0% { content: ''; }
    25% { content: '.'; }
    50% { content: '..'; }
    75% { content: '...'; }
  }

  /* Weekly plan */
  .weekly-toggle {
    font-size: 13px;
    color: var(--primary);
    cursor: pointer;
    margin-top: 8px;
    display: inline-block;
  }
  .weekly-toggle:hover { text-decoration: underline; }
  .weekly-plan { margin-top: 12px; }
  .day-plan {
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }
  .day-plan:last-child { border-bottom: none; }
  .day-plan h5 {
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 4px;
  }
  .day-plan p {
    font-size: 12px;
    color: var(--text2);
  }

  /* Food properties table */
  .prop-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
    margin: 10px 0;
  }
  .prop-item {
    padding: 8px;
    border-radius: 8px;
    font-size: 12px;
    text-align: center;
    background: var(--bg2);
  }
  .prop-warm { background: var(--coral-light); color: var(--coral); }
  .prop-cool { background: var(--blue-light); color: var(--blue); }
  .prop-neutral { background: var(--bg2); color: var(--text2); }
</style>
</head>
<body>

<div class="container" id="app">

  <!-- Header -->
  <div class="header">
    <h1>饮食分析智能体</h1>
    <div class="sub">辨证食疗 · 双医交叉 · 定制食谱 · 康复追踪</div>
    <div class="tag-row">
      <span class="tag tag-tcm">中医辨证</span>
      <span class="tag tag-west">西医诊断</span>
      <span class="tag tag-core">交叉验证</span>
    </div>
  </div>

  <!-- Tab: 输入 / 结果 / 饮食日志 -->
  <div class="tabs">
    <button class="tab active" data-tab="input" onclick="switchTab('input')">症状输入</button>
    <button class="tab" data-tab="result" onclick="switchTab('result')" id="resultTab">分析结果</button>
    <button class="tab" data-tab="history" onclick="switchTab('history')" id="historyTab">饮食日志 <span class="badge" id="logCount">0</span></button>
  </div>

  <!-- ============ TAB 1: INPUT ============ -->
  <div id="tab-input" class="tab-content">

    <!-- Step 1: 症状选择 -->
    <div class="card">
      <h2><span class="icon" style="background:var(--amber-light);color:var(--amber);">1</span> 你现在有什么感觉？</h2>

      <div class="symptom-group">
        <h3>全身症状</h3>
        <div class="symptom-grid" data-group="全身">
          <button class="symptom-btn" data-symptom="怕冷">怕冷</button>
          <button class="symptom-btn" data-symptom="发热">发热</button>
          <button class="symptom-btn" data-symptom="怕风">怕风</button>
          <button class="symptom-btn" data-symptom="无汗">无汗</button>
          <button class="symptom-btn" data-symptom="有汗">有汗</button>
          <button class="symptom-btn" data-symptom="身体沉重">身体沉重</button>
          <button class="symptom-btn" data-symptom="乏力">乏力</button>
          <button class="symptom-btn" data-symptom="怕热">怕热</button>
        </div>
      </div>

      <div class="symptom-group">
        <h3>头面</h3>
        <div class="symptom-grid" data-group="头面">
          <button class="symptom-btn" data-symptom="头痛">头痛</button>
          <button class="symptom-btn" data-symptom="鼻塞">鼻塞</button>
          <button class="symptom-btn" data-symptom="流清涕">流清涕</button>
          <button class="symptom-btn" data-symptom="流黄涕">流黄涕</button>
          <button class="symptom-btn" data-symptom="咽喉痛">咽喉痛</button>
          <button class="symptom-btn" data-symptom="咳嗽">咳嗽</button>
          <button class="symptom-btn" data-symptom="咳白痰">咳白痰</button>
          <button class="symptom-btn" data-symptom="咳黄痰">咳黄痰</button>
          <button class="symptom-btn" data-symptom="头晕">头晕</button>
          <button class="symptom-btn" data-symptom="口干">口干</button>
          <button class="symptom-btn" data-symptom="口苦">口苦</button>
          <button class="symptom-btn" data-symptom="口淡无味">口淡无味</button>
        </div>
      </div>

      <div class="symptom-group">
        <h3>消化系统</h3>
        <div class="symptom-grid" data-group="消化">
          <button class="symptom-btn" data-symptom="恶心">恶心</button>
          <button class="symptom-btn" data-symptom="呕吐">呕吐</button>
          <button class="symptom-btn" data-symptom="食欲差">食欲差</button>
          <button class="symptom-btn" data-symptom="腹胀">腹胀</button>
          <button class="symptom-btn" data-symptom="腹痛">腹痛</button>
          <button class="symptom-btn" data-symptom="腹泻">腹泻</button>
          <button class="symptom-btn" data-symptom="大便稀溏">大便稀溏</button>
          <button class="symptom-btn" data-symptom="大便干结">大便干结</button>
          <button class="symptom-btn" data-symptom="胃寒">胃寒</button>
          <button class="symptom-btn" data-symptom="胃灼热">胃灼热</button>
          <button class="symptom-btn" data-symptom="反酸">反酸</button>
          <button class="symptom-btn" data-symptom="打嗝">打嗝</button>
        </div>
      </div>

      <div class="symptom-group">
        <h3>其他</h3>
        <div class="symptom-grid" data-group="其他">
          <button class="symptom-btn" data-symptom="失眠">失眠</button>
          <button class="symptom-btn" data-symptom="烦躁">烦躁</button>
          <button class="symptom-btn" data-symptom="胸闷">胸闷</button>
          <button class="symptom-btn" data-symptom="心悸">心悸</button>
          <button class="symptom-btn" data-symptom="腰酸">腰酸</button>
          <button class="symptom-btn" data-symptom="四肢冷">四肢冷</button>
          <button class="symptom-btn" data-symptom="手脚心热">手脚心热</button>
          <button class="symptom-btn" data-symptom="皮肤痒">皮肤痒</button>
          <button class="symptom-btn" data-symptom="湿疹">湿疹</button>
        </div>
      </div>

      <div style="margin-top:16px;">
        <label style="font-size:13px;font-weight:500;color:var(--text2);display:block;margin-bottom:6px;">补充描述（舌苔、脉象、其他感觉等）</label>
        <textarea class="free-text" id="symptomFreeText" placeholder="比如：舌苔白腻、脉浮紧、早上起来喉咙有痰、一吹风就头疼加重……"></textarea>
      </div>
    </div>

    <!-- Step 2: 西医诊断 -->
    <div class="card">
      <h2><span class="icon" style="background:var(--blue-light);color:var(--blue);">2</span> 医院确诊信息</h2>
      <div class="diag-row">
        <div class="diag-field">
          <label>医生诊断（病名）</label>
          <input type="text" id="diagName" placeholder="如：急性肠胃炎 / 上呼吸道感染 / 湿疹">
        </div>
        <div class="diag-field">
          <label>是否有发烧</label>
          <input type="text" id="diagFever" placeholder="体温 / 持续时间">
        </div>
      </div>
      <div class="diag-field" style="margin-bottom:12px;">
        <label>医生开的药 / 药方</label>
        <textarea class="free-text" id="diagMeds" placeholder="如：头孢克肟、蒙脱石散、中药方剂……" style="min-height:60px;"></textarea>
      </div>
      <div class="diag-field">
        <label>中医诊断（如果有）</label>
        <textarea class="free-text" id="diagTcm" placeholder="如：医生说是脾胃虚寒、湿热下注……" style="min-height:60px;"></textarea>
      </div>
    </div>

    <!-- Step 3: 分析触发 -->
    <button class="btn-primary" onclick="analyze()">辨证分析 → 生成食谱</button>
  </div>

  <!-- ============ TAB 2: RESULT ============ -->
  <div id="tab-result" class="tab-content" style="display:none;">

    <!-- Pattern result -->
    <div class="card">
      <h2><span class="icon" style="background:var(--primary-light);color:var(--primary);">证</span> 体质辨证结果</h2>
      <div id="patternResult"></div>
      <div class="principle-box" id="principleBox"></div>
      <div style="font-size:12px;color:var(--text3);">匹配置信度</div>
      <div class="confidence-bar"><div class="confidence-fill" id="confidenceFill" style="width:0%"></div></div>
    </div>

    <!-- Diet principles -->
    <div class="card">
      <h2><span class="icon" style="background:var(--coral-light);color:var(--coral);">食</span> 饮食原则</h2>
      <div id="dietPrinciple"></div>
    </div>

    <!-- Food: OK / Avoid -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;">
      <div class="card" style="margin:0;">
        <h2 style="font-size:14px;margin-bottom:10px;">推荐食材</h2>
        <div class="food-list" id="recommendFoods"></div>
      </div>
      <div class="card" style="margin:0;">
        <h2 style="font-size:14px;margin-bottom:10px;">禁忌食物</h2>
        <div class="food-list" id="avoidFoods"></div>
      </div>
    </div>

    <!-- Meal plan -->
    <div class="card">
      <h2><span class="icon" style="background:var(--green-light);color:var(--green);">餐</span> 今日三餐建议</h2>
      <div class="meal-grid" id="mealGrid"></div>
      <div class="food-detail-toggle" onclick="toggleWeekly()">展开一周食谱 ▼</div>
      <div class="weekly-plan hidden" id="weeklyPlan"></div>
    </div>

    <!-- Healing recipes -->
    <div class="card">
      <h2><span class="icon" style="background:var(--coral-light);color:var(--coral);">方</span> 食疗方推荐</h2>
      <div id="recipeList"></div>
    </div>

    <!-- Feedback -->
    <div class="card">
      <h2><span class="icon" style="background:var(--teal-light);color:var(--teal);">反</span> 吃了之后感觉怎么样？</h2>
      <p style="font-size:13px;color:var(--text2);margin-bottom:8px;">记录你的饮食反馈，帮助智能体学习优化</p>
      <div style="margin-bottom:10px;">
        <textarea class="free-text" id="feedbackNote" placeholder="今天吃了什么？感觉如何？有什么变化？" style="min-height:60px;font-size:13px;"></textarea>
      </div>
      <div class="feedback-row">
        <button class="feedback-btn" data-fb="good" onclick="recordFeedback('good')">明显好转</button>
        <button class="feedback-btn" data-fb="ok" onclick="recordFeedback('ok')">感觉一般</button>
        <button class="feedback-btn" data-fb="bad" onclick="recordFeedback('bad')">加重了</button>
      </div>
      <div id="feedbackConfirm" style="font-size:13px;color:var(--green);margin-top:8px;display:none;"></div>
    </div>
  </div>

  <!-- ============ TAB 3: HISTORY ============ -->

let state = {

// ============================================================

function switchTab(name) {
  document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none');
  document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + name).style.display = 'block';
  document.querySelector(`[data-tab="${name}"]`).classList.add('active');
}

// Symptom toggle
document.querySelectorAll('.symptom-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    const symptom = this.dataset.symptom;
    if (state.selectedSymptoms.has(symptom)) {
      state.selectedSymptoms.delete(symptom);
      this.classList.remove('selected');
    } else {
      state.selectedSymptoms.add(symptom);
      this.classList.add('selected');
    }
  });
});

// ============================================================
// ANALYSIS ENGINE
// ============================================================
function analyze() {
  const symptoms = Array.from(state.selectedSymptoms);
  const freeText = document.getElementById('symptomFreeText').value.trim();
  const diagName = document.getElementById('diagName').value.trim();
  const diagMeds = document.getElementById('diagMeds').value.trim();
  const diagTcm = document.getElementById('diagTcm').value.trim();

  if (symptoms.length === 0 && !freeText) {
    alert('请至少选择或描述一个症状，帮你分析体质。');
    return;
  }

  // Score each pattern
  let scored = TCM_PATTERNS.map(p => {
    let matchCount = 0;
    let partialCount = 0;
    symptoms.forEach(s => {
      if (p.symptoms.includes(s)) matchCount++;
    });
    // Also check free text
    if (freeText) {
      p.symptoms.forEach(s => {
        if (freeText.includes(s)) partialCount += 0.5;
      });
    }
    // Check TCM diagnosis match
    if (diagTcm && freeText) {
      // extra boost if TCM diagnosis keywords overlap
    }

    let confidence = (matchCount + partialCount) / Math.max(symptoms.length + 1, 3);
    return { pattern: p, score: confidence, matchCount };
  });

  scored.sort((a, b) => b.score - a.score);

  // If scores are too close, check western diagnosis for tiebreak
  if (scored.length > 1 && scored[0].score - scored[1].score < 0.15 && diagName) {
    // Try to match western diagnosis to pattern
    const diagKeywords = {
      '上呼吸道感染': ['feng-han', 'feng-re'],
      '感冒': ['feng-han', 'feng-re'],
      '肠胃炎': ['pi-wei-xu-han', 'pi-wei-shi-re', 'shi-re-xia-zhu'],
      '胃炎': ['pi-wei-xu-han', 'pi-wei-shi-re'],
      '湿疹': ['shi-re-xia-zhu', 'pi-wei-shi-re'],
      '消化不良': ['shi-ji', 'pi-wei-xu-han'],
      '慢性胃炎': ['pi-wei-xu-han', 'tan-shi'],
      '气管炎': ['tan-shi', 'feng-han'],
      '肺炎': ['feng-re', 'tan-shi'],
      '腹泻': ['pi-wei-xu-han', 'pi-wei-shi-re', 'shi-re-xia-zhu'],
      '过敏': ['feng-re', 'pi-wei-xu-han'],
      '咽喉炎': ['feng-re', 'yin-xu'],
      '失眠': ['yin-xu', 'gan-yu'],
      '疲劳综合征': ['qi-xu', 'pi-wei-xu-han'],
      '新冠': ['wen-bing-hou', 'feng-re', 'tan-shi']
    };

    for (let [kw, ids] of Object.entries(diagKeywords)) {
      if (diagName.includes(kw)) {
        scored.forEach(s => {
          if (ids.includes(s.pattern.id)) s.score += 0.2;
        });
        break;
      }
    }
    scored.sort((a, b) => b.score - a.score);
  }

  const best = scored[0];
  if (!best || best.score < 0.05) {
    alert('暂时无法匹配到已知体质类型，建议补充更多信息。');
    return;
  }

  state.lastPattern = best.pattern;

  // Render result
  renderResult(best.pattern, Math.round(best.score * 100), scored);
  switchTab('result');
}

function renderResult(pattern, confidence, allScores) {
  // Pattern badge
  const colorMap = {
    'warm': { bg: 'var(--coral-light)', color: 'var(--coral)', text: '温性体质 · 宜温热' },
    'cool': { bg: 'var(--blue-light)', color: 'var(--blue)', text: '凉性体质 · 宜清凉' },
    'neutral': { bg: 'var(--bg2)', color: 'var(--text2)', text: '平性体质 · 宜中和' }
  };
  const info = colorMap[pattern.nature] || colorMap.neutral;

  document.getElementById('patternResult').innerHTML =
    `<span class="pattern-badge" style="background:${info.bg};color:${info.color};">${pattern.name}</span>` +
    `<span style="font-size:13px;color:var(--text2);margin-left:8px;">（${info.text}）</span>` +
    (confidence < 60 ? `<div style="font-size:12px;color:var(--amber);margin-top:6px;">提示：症状信息有限，建议补充舌苔和脉象以获得更准确判断。</div>` : '');

  document.getElementById('principleBox').textContent = pattern.principle;
  document.getElementById('confidenceFill').style.width = Math.min(confidence, 100) + '%';

  // Diet principle
  document.getElementById('dietPrinciple').innerHTML =
    `<p style="font-size:14px;margin-bottom:8px;">${pattern.dietPrinciple}</p>` +
    `<div class="prop-grid">
      <div class="prop-item ${pattern.nature === 'warm' ? 'prop-warm' : ''}">宜温</div>
      <div class="prop-item ${pattern.nature === 'neutral' ? 'prop-neutral' : ''}">宜淡</div>
      <div class="prop-item ${pattern.nature === 'cool' ? 'prop-cool' : ''}">宜软</div>
    </div>`;

  // Foods
  const recommendHtml = pattern.okFoods.map(f =>
    `<span class="food-tag food-ok">${f}</span>`
  ).join('');
  document.getElementById('recommendFoods').innerHTML = recommendHtml;

  const avoidHtml = pattern.avoidFoods.map(f =>
    `<span class="food-tag food-no">${f}</span>`
  ).join('');
  document.getElementById('avoidFoods').innerHTML = avoidHtml;

  // Meals
  document.getElementById('mealGrid').innerHTML = [
    { icon: '☀', title: '早餐', content: pattern.weekly?.[0]?.meals?.split('。')[0] + '。' || '小米粥或温热粥品，避免生冷' },
    { icon: '🌤', title: '午餐', content: pattern.weekly?.[0]?.meals?.split('。')[1] + '。' || '温热软食，营养均衡' },
    { icon: '🌙', title: '晚餐', content: pattern.weekly?.[0]?.meals?.split('。')[2] + '。' || '清淡易消化，七分饱' },
    { icon: '🥜', title: '加餐', content: '温热汤羹或蒸水果，不建议冷食零食' }
  ].map(m => `
    <div class="meal-card">
      <h4><span class="meal-icon">${m.icon}</span>${m.title}</h4>
      <p>${m.content}</p>
    </div>
  `).join('');

  // Weekly plan
  document.getElementById('weeklyPlan').innerHTML = pattern.weekly.map((d, i) => `
    <div class="day-plan">
      <h5>${d.day}</h5>
      <p>${d.meals}</p>
    </div>

  // Recipes
  document.getElementById('recipeList').innerHTML = pattern.recipes.map(r => `

}

// ============================================================
// FEEDBACK
// ============================================================
function recordFeedback(rating) {
  const note = document.getElementById('feedbackNote').value.trim();
  const pattern = state.lastPattern;
  if (!pattern) { alert('请先完成辨证分析'); return; }

  const entry = {
    timestamp: new Date().toLocaleString(),
    pattern: pattern.name,
    rating: rating,
    note: note || '(未备注)',
    okFoods: pattern.okFoods.slice(0, 5),
    avoidFoods: pattern.avoidFoods.slice(0, 5)
  };

  state.feedbacks.push(entry);
  localStorage.setItem('dietFeedbacks', JSON.stringify(state.feedbacks));

  // Visual feedback
  document.querySelectorAll('.feedback-btn').forEach(b => b.className = 'feedback-btn');
  document.querySelector(`[data-fb="${rating}"]`).classList.add(
    rating === 'good' ? 'selected-good' : rating === 'bad' ? 'selected-bad' : 'selected-ok'
  );

  const confirmEl = document.getElementById('feedbackConfirm');
  confirmEl.style.display = 'block';
  confirmEl.textContent = rating === 'good' ? '不错！继续坚持这个饮食方向。' :
    rating === 'ok' ? '收到，可以微调食谱再看看。' : '收到！说明这个饮食方案需要调整，建议重新分析。';

  setTimeout(() => { confirmEl.style.display = 'none'; }, 3000);

  updateLogView();
}

function updateLogView() {
  const list = document.getElementById('logList');
  const empty = document.getElementById('logEmpty');
  const count = document.getElementById('logCount');

  if (state.feedbacks.length === 0) {
    list.innerHTML = '';
    empty.style.display = 'block';
    count.textContent = '0';
    return;
  }

  empty.style.display = 'none';
  count.textContent = state.feedbacks.length;

  // Display in reverse chronological order
  const reversed = [...state.feedbacks].reverse();
  list.innerHTML = reversed.map((f, i) => {
    const emoji = f.rating === 'good' ? '✓' : f.rating === 'bad' ? '✗' : '~';
    const color = f.rating === 'good' ? 'var(--green)' : f.rating === 'bad' ? 'var(--red)' : 'var(--amber)';
    return `
      <div style="padding:12px 0;border-bottom:1px solid var(--border);display:flex;gap:12px;align-items:flex-start;">
        <span style="font-size:16px;color:${color};font-weight:500;min-width:20px;">${emoji}</span>
        <div style="flex:1;">
          <div style="font-size:13px;font-weight:500;">${f.pattern || '辨证'} 饮食反馈</div>
          <div style="font-size:12px;color:var(--text2);margin:2px 0;">${f.note}</div>
          <div style="font-size:11px;color:var(--text3);">${f.timestamp}</div>
        </div>
      </div>
    `;
  }).join('');
}
